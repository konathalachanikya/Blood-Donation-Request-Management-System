{% extends "base.html" %}
{% block title %}New Blood Request{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card shadow-lg border-0 rounded-4">
      <div class="card-body p-4">
        <h3 class="fw-bold mb-3">Submit Blood Request</h3>

        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Patient Name</label>
            <input type="text" name="patient_name" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Contact Number</label>
            <input type="text" name="contact_number" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Blood Group Needed</label>
            <select name="blood_group_needed" class="form-select" required>
              <option value="">-- Select Blood Group --</option>
              {% for bg in ["A+","A-","B+","B-","AB+","AB-","O+","O-"] %}
                <option value="{{ bg }}">{{ bg }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">City</label>
              <input type="text" name="city" class="form-control" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Pincode</label>
              <input type="text" name="pincode" class="form-control" required>
            </div>
          </div>

          <button class="btn btn-danger w-100 py-2 fw-semibold">Submit Request</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

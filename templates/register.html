{% extends "base.html" %}
{% block title %}Register | BloodCare+{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-lg border-0 rounded-4">
      <div class="card-body p-4">
        <h3 class="fw-bold text-center mb-3">Create Account</h3>

        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" name="name" class="form-control" placeholder="Enter full name" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" placeholder="Enter email" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Create password" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Register As</label>
            <select name="role" class="form-select" required>
              <option value="">-- Select Role --</option>
              <option value="donor">Donor</option>
              <option value="volunteer">Volunteer</option>
              <option value="requester">Hospital/Patient</option>
            </select>
          </div>

          <button class="btn btn-danger w-100 py-2 fw-semibold">Register</button>

          <p class="text-center mt-3 mb-0">
            Already have an account?
            <a href="{{ url_for('login') }}" class="fw-semibold">Login</a>
          </p>
        </form>

      </div>
    </div>
  </div>
</div>
{% endblock %}
